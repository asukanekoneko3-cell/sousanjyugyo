<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5f3ee">
<title>授業スケジュール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#f5f3ee;
  --surface:#ffffff;
  --surface2:#f0ede6;
  --border:#e2ddd5;
  --border2:#ccc8bf;
  --text:#1a1814;
  --text2:#6b6760;
  --text3:#a09d97;
  --accent:#2d6a4f;
  --accent-bg:#eaf4ef;
  --accent-border:#a8d5bc;
  --warn:#b45309;
  --warn-bg:#fef3c7;
  --warn-border:#fcd34d;
  --info:#1d4ed8;
  --info-bg:#eff6ff;
  --info-border:#93c5fd;
  --danger:#dc2626;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1814;
    --surface:#25231f;
    --surface2:#2e2b26;
    --border:#3a3731;
    --border2:#4a4741;
    --text:#f0ede6;
    --text2:#a09d97;
    --text3:#6b6760;
    --accent:#4ade80;
    --accent-bg:#14381f;
    --accent-border:#166534;
    --warn:#fbbf24;
    --warn-bg:#2d1f02;
    --warn-border:#78350f;
    --info:#60a5fa;
    --info-bg:#0f1e3d;
    --info-border:#1e3a8a;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100dvh}

/* ナビ */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 8px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;font-size:10px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn i{font-size:22px}

/* メインコンテンツ */
.main{flex:1;padding:1.25rem 1rem calc(80px + env(safe-area-inset-bottom));overflow-y:auto}
.page{display:none}.page.active{display:block}

/* ヘッダー */
.day-hero{margin-bottom:1.25rem}
.day-hero-label{font-size:12px;color:var(--text3);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.day-hero-date{font-size:24px;font-weight:700;color:var(--text)}

/* セクションラベル */
.sec{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:1.25rem 0 8px}

/* 空状態 */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.5}
.empty p{font-size:14px;line-height:1.8}

/* 授業カード */
.lesson-card{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);transition:opacity .2s}
.lesson-card.current{border-color:var(--accent-border);background:var(--accent-bg)}
.lesson-card.faded{opacity:.38}
.l-time{font-size:13px;font-weight:500;color:var(--text2);width:38px;flex-shrink:0}
.l-name{flex:1;font-size:15px;font-weight:500;color:var(--text)}
.l-room{font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;flex-shrink:0}
.now-chip{font-size:10px;font-weight:700;background:var(--accent);color:#fff;border-radius:6px;padding:2px 7px;flex-shrink:0;letter-spacing:.04em}
.chk-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);transition:all .15s}
.chk-btn.done{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.chk-btn i{font-size:16px}

/* 行事カード */
.event-card{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow)}
.event-card.joined{background:var(--accent-bg);border-color:var(--accent-border)}
.event-card.planned{background:var(--warn-bg);border-color:var(--warn-border)}
.ev-date{width:44px;flex-shrink:0;text-align:center}
.ev-mo{font-size:10px;color:var(--text3);font-weight:500}
.ev-d{font-size:20px;font-weight:700;color:var(--text);line-height:1.2}
.ev-wd{font-size:10px;color:var(--text3)}
.ev-info{flex:1;min-width:0}
.ev-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.ev-meta{font-size:12px;color:var(--text2)}
.ev-badge{font-size:11px;font-weight:500;border-radius:6px;padding:3px 8px;flex-shrink:0;white-space:nowrap}
.badge-joined{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
.badge-planned{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.badge-none{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}

/* カレンダー */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-month{font-size:18px;font-weight:700;color:var(--text)}
.cal-arrow{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);box-shadow:var(--shadow)}
.cal-arrow i{font-size:18px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-wday{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:4px 0}
.cal-cell{min-height:56px;border-radius:var(--radius-sm);padding:5px 4px;background:var(--surface);border:1px solid var(--border)}
.cal-cell.other{background:transparent;border-color:transparent;opacity:.3}
.cal-cell.today{border-color:var(--info-border);background:var(--info-bg)}
.cal-cell.has-data{cursor:pointer;transition:background .12s}
.cal-cell.has-data:active{background:var(--surface2)}
.cal-num{font-size:12px;font-weight:500;color:var(--text);text-align:center;margin-bottom:3px}
.cal-cell.today .cal-num{color:var(--info);font-weight:700}
.cal-pip-l{font-size:9px;background:var(--info-bg);color:var(--info);border:1px solid var(--info-border);border-radius:4px;padding:1px 3px;text-align:center;line-height:1.5;margin-bottom:2px}
.cal-pip-e{font-size:9px;background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border);border-radius:4px;padding:1px 3px;text-align:center;line-height:1.5}

/* 登録タブ */
.update-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.update-box-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.update-box-sub{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.7}
.update-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:10px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-family:inherit;transition:background .15s}
.update-btn:active{background:var(--border)}
.last-sync{font-size:11px;color:var(--text3);margin-top:8px;text-align:center}
.add-row{display:flex;gap:8px;margin-bottom:1rem}
.add-row input{flex:1;font-size:14px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.add-row input:focus{border-color:var(--accent)}
.add-row button{padding:9px 14px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;white-space:nowrap;font-family:inherit}
.date-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem;scrollbar-width:none}
.date-tabs::-webkit-scrollbar{display:none}
.date-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;background:var(--surface);color:var(--text2);font-family:inherit;white-space:nowrap;transition:all .15s}
.date-tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.prog-bar{height:4px;background:var(--surface2);border-radius:4px;margin-bottom:6px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.prog-txt{font-size:12px;color:var(--text2);margin-bottom:1rem}
.slot-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.slot-time{font-size:12px;color:var(--text3);width:36px;flex-shrink:0;font-weight:500}
.slot-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
.slot-card.active-slot{border-color:var(--accent-border)}
select{border:none;background:transparent;color:var(--text);cursor:pointer;padding:0;outline:none;font-family:inherit;font-size:14px;flex:1;min-width:0}
.room-sel{font-size:12px;color:var(--text2);width:52px;flex:none}

/* ボトムシート */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.bottom-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;padding:1.25rem 1.1rem calc(1.5rem + env(safe-area-inset-bottom));max-height:80dvh;overflow-y:auto}
.bs-handle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 1.1rem}
.bs-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:1rem}
.bs-lesson{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:7px}
.bs-time{font-size:13px;color:var(--text2);width:36px;flex-shrink:0;font-weight:500}
.bs-name{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.bs-room{font-size:12px;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2px 8px}
.bs-event{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);margin-bottom:7px}
.bs-close{width:100%;padding:11px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;margin-top:12px;font-family:inherit;font-weight:500}

@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>

<main class="main">
  <!-- 今日 -->
  <div class="page active" id="page-today"></div>
  <!-- 明日 -->
  <div class="page" id="page-tmrw"></div>
  <!-- カレンダー -->
  <div class="page" id="page-cal">
    <div class="cal-header">
      <button class="cal-arrow" onclick="calMove(-1)" aria-label="前の月"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-month" id="cal-month"></div>
      <button class="cal-arrow" onclick="calMove(1)" aria-label="次の月"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="cal-wday">日</div><div class="cal-wday">月</div><div class="cal-wday">火</div>
      <div class="cal-wday">水</div><div class="cal-wday">木</div><div class="cal-wday">金</div><div class="cal-wday">土</div>
    </div>
  </div>
  <!-- 行事 -->
  <div class="page" id="page-events"></div>
  <!-- 登録 -->
  <div class="page" id="page-manage">
    <div class="update-box">
      <div class="update-box-title"><i class="ti ti-table" style="font-size:14px;margin-right:4px;vertical-align:-2px"></i>スプシから最新データを取得</div>
      <div class="update-box-sub">来年度など科目や行事が変わったときにタップ。授業の登録データはそのまま残ります。</div>
      <button class="update-btn" onclick="syncFromSheet()" id="update-btn">
        <i class="ti ti-refresh" style="font-size:16px"></i> 科目リスト・行事を更新する
      </button>
      <div class="last-sync" id="last-sync"></div>
    </div>
    <div class="add-row">
      <input type="date" id="new-date" aria-label="追加する日付">
      <button onclick="addDate()"><i class="ti ti-plus" style="font-size:15px;vertical-align:-2px"></i> 追加</button>
    </div>
    <div class="date-tabs" id="date-tabs"></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-txt" id="prog-txt"></div>
    <div id="slots-con"></div>
  </div>
</main>

<!-- ボトムナビ -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('today')" id="nav-today">
    <i class="ti ti-sun"></i>今日
  </button>
  <button class="nav-btn" onclick="showPage('tmrw')" id="nav-tmrw">
    <i class="ti ti-moon"></i>明日
  </button>
  <button class="nav-btn" onclick="showPage('cal')" id="nav-cal">
    <i class="ti ti-calendar"></i>カレンダー
  </button>
  <button class="nav-btn" onclick="showPage('events')" id="nav-events">
    <i class="ti ti-star"></i>行事
  </button>
  <button class="nav-btn" onclick="showPage('manage')" id="nav-manage">
    <i class="ti ti-pencil"></i>登録
  </button>
</nav>

<!-- ボトムシート -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="bottom-sheet">
    <div class="bs-handle"></div>
    <div class="bs-title" id="bs-title"></div>
    <div id="bs-body"></div>
    <button class="bs-close" onclick="closeSheet()">閉じる</button>
  </div>
</div>

<script>
const SHEET_ID='1FEAlmLlGvrKvwpAPJZB2pB0Z1RhVvnGqrrEjrNRUi2A';
const EXPORT_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const PROXY='https://corsproxy.io/?';
const ROOMS=['（なし）','301','302','401','501','601','701','801'];
const HOURS=[9,10,11,12,13,14,15,16];
const WDAYS=['日','月','火','水','木','金','土'];

const DEF_SUBJECTS=['（なし）','現代の国語','言語文化','地理総合','歴史総合','数学Ⅰ','科学と人間生活','体育①','保険①','英語コミュⅠ','情報Ⅰ','総合探求①','キャリ教基'];
const DEF_EVENTS=[
  {date:'2026-04-01',name:'スタートアップセミナー',memo:'',units:2,status:'参加済み'},
  {date:'2026-04-01',name:'進路ガイダンス',memo:'',units:2,status:'参加済み'},
  {date:'2026-04-06',name:'入学式',memo:'',units:1,status:'参加済み'},
  {date:'2026-04-24',name:'BBQ',memo:'',units:2,status:'参加済み'},
  {date:'2026-05-22',name:'動物園遠足',memo:'',units:2,status:'ー'},
  {date:'2026-05-30',name:'野球観戦',memo:'',units:3,status:'ー'},
  {date:'2026-06-29',name:'ASU★FES',memo:'',units:3,status:'参加予定'},
  {date:'2026-07-17',name:'ビューティーショー',memo:'',units:2,status:'ー'},
  {date:'2026-07-28',name:'陶芸教室',memo:'',units:2,status:'ー'},
  {date:'2026-08-07',name:'きずなオリンピック',memo:'',units:3,status:'ー'},
  {date:'2026-09-14',name:'前期終業式',memo:'',units:2,status:'参加予定'},
  {date:'2026-09-15',name:'三幸フェスティバル見学',memo:'',units:2,status:'ー'},
  {date:'2026-10-01',name:'後期始業式',memo:'',units:2,status:'参加予定'},
  {date:'2026-10-19',name:'救急蘇生員講習会',memo:'',units:2,status:'ー'},
  {date:'2026-10-30',name:'ハロウィン清掃',memo:'',units:2,status:'ー'},
  {date:'2026-11-09',name:'文化祭準備日',memo:'',units:2,status:'参加予定'},
  {date:'2026-11-10',name:'文化祭1日目',memo:'',units:3,status:'参加予定'},
  {date:'2026-11-11',name:'文化祭2日目',memo:'',units:3,status:'参加予定'},
  {date:'2026-12-11',name:'ボウリング大会',memo:'2000円',units:2,status:'参加予定'},
  {date:'2026-12-25',name:'大掃除',memo:'',units:3,status:'参加予定'},
  {date:'2027-01-08',name:'太宰府天満宮参拝',memo:'',units:2,status:'ー'},
  {date:'2027-01-22',name:'DVD鑑賞会',memo:'',units:3,status:'参加予定'},
  {date:'2027-02-12',name:'いちご狩り',memo:'3500円',units:2,status:'ー'},
  {date:'2027-02-22',name:'後期終業式',memo:'福岡市民ホール',units:2,status:'参加予定'},
  {date:'2027-03-02',name:'在校生HR',memo:'どちらか1日',units:2,status:'参加予定'},
  {date:'2027-03-03',name:'在校生HR',memo:'どちらか1日',units:2,status:'参加予定'},
  {date:'2027-03-08',name:'後期卒業式',memo:'福岡市民ホール',units:2,status:'参加予定'},
];

let state=JSON.parse(localStorage.getItem('school_v7')||'null')||{dates:[],data:{},subjects:[],events:[],lastUpdated:null};
if(!state.subjects||!state.subjects.length)state.subjects=DEF_SUBJECTS;
if(!state.events||!state.events.length)state.events=DEF_EVENTS;

let activeDate=null,curPage='today',calY=0,calM=0;

function save(){try{localStorage.setItem('school_v7',JSON.stringify(state));}catch(e){}}
function dateKey(d){return[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}
function fmtMD(s){const p=s.split('-');return`${parseInt(p[1])}月${parseInt(p[2])}日`}
function fmtSlash(s){const p=s.split('-');return`${parseInt(p[1])}/${parseInt(p[2])}`}
function wday(s){return WDAYS[new Date(s+'T00:00:00').getDay()]}
function nowD(){return new Date()}

function showPage(p){
  curPage=p;
  ['today','tmrw','cal','events','manage'].forEach(id=>{
    document.getElementById('page-'+id).classList.toggle('active',id===p);
    document.getElementById('nav-'+id).classList.toggle('active',id===p);
  });
  if(p==='today')renderDay('today');
  else if(p==='tmrw')renderDay('tmrw');
  else if(p==='cal')renderCal();
  else if(p==='events')renderEvents();
  else{renderTabs();renderSlots();renderProg();renderLastSync();}
}

/* ---- 今日・明日 ---- */
function renderDay(which){
  const today=nowD();
  const target=new Date(today);
  if(which==='tmrw')target.setDate(target.getDate()+1);
  const key=dateKey(target);
  const con=document.getElementById('page-'+which);
  const nowH=today.getHours();
  let html=`<div class="day-hero"><div class="day-hero-label">${which==='today'?'TODAY · 今日':'TOMORROW · 明日'}</div><div class="day-hero-date">${fmtMD(key)}（${wday(key)}）</div></div>`;

  const dayEvts=state.events.filter(e=>e.date===key);
  if(dayEvts.length){
    html+=`<div class="sec">行事</div>`;
    dayEvts.forEach(e=>{
      const bc=e.status==='参加済み'?'badge-joined':e.status==='参加予定'?'badge-planned':'badge-none';
      const rc=e.status==='参加済み'?' joined':e.status==='参加予定'?' planned':'';
      html+=`<div class="event-card${rc}">
        <i class="ti ti-star" style="font-size:16px;color:var(--warn);flex-shrink:0;margin-top:3px"></i>
        <div class="ev-info"><div class="ev-name">${e.name}</div><div class="ev-meta">${e.memo?e.memo+'・':''}${e.units}コマ</div></div>
        <span class="ev-badge ${bc}">${e.status}</span>
      </div>`;
    });
  }

  const dayData=state.data[key];
  if(!dayData){
    if(!dayEvts.length)html+=`<div class="empty"><i class="ti ti-calendar-off"></i><p>授業が登録されていません<br><span style="font-size:12px">「登録」タブから追加してください</span></p></div>`;
    con.innerHTML=html;return;
  }
  const classes=HOURS.filter(h=>dayData[h]&&dayData[h].subject!=='（なし）');
  if(!classes.length){con.innerHTML=html;return;}
  const past=which==='today'?classes.filter(h=>h<nowH):[];
  const upcoming=which==='today'?classes.filter(h=>h>=nowH):classes;

  if(upcoming.length){
    html+=`<div class="sec">${which==='today'&&past.length?'これから':'授業'}</div>`;
    upcoming.forEach(h=>{
      const s=dayData[h];const isCur=which==='today'&&h===nowH;const isDone=s.attended;
      html+=`<div class="lesson-card${isCur?' current':''}${isDone?' faded':''}">
        <span class="l-time">${h}:00</span>
        <span class="l-name">${s.subject}</span>
        ${s.room!=='（なし）'?`<span class="l-room">${s.room}</span>`:''}
        ${isCur?`<span class="now-chip">NOW</span>`:''}
        ${which==='today'?`<button class="chk-btn${isDone?' done':''}" onclick="toggleAtt('${key}',${h})" aria-label="出席チェック"><i class="ti ti-check"></i></button>`:''}
      </div>`;
    });
  }
  if(past.length){
    html+=`<div class="sec" style="margin-top:1.25rem">終わった授業</div>`;
    past.forEach(h=>{
      const s=dayData[h];const isDone=s.attended;
      html+=`<div class="lesson-card faded">
        <span class="l-time">${h}:00</span>
        <span class="l-name">${s.subject}</span>
        ${s.room!=='（なし）'?`<span class="l-room">${s.room}</span>`:''}
        <button class="chk-btn${isDone?' done':''}" onclick="toggleAtt('${key}',${h})" aria-label="出席チェック"><i class="ti ti-check"></i></button>
      </div>`;
    });
  }
  con.innerHTML=html;
}

function toggleAtt(key,h){
  if(!state.data[key]||!state.data[key][h])return;
  state.data[key][h].attended=!state.data[key][h].attended;
  save();
  if(curPage==='today')renderDay('today');
  if(curPage==='tmrw')renderDay('tmrw');
  renderProg();
}

/* ---- 行事一覧 ---- */
function renderEvents(){
  const con=document.getElementById('page-events');
  const today=dateKey(nowD());
  const upcoming=state.events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past=[...state.events.filter(e=>e.date<today)].sort((a,b)=>b.date.localeCompare(a.date));
  const mkCard=(e,isPast)=>{
    const p=e.date.split('-');
    const bc=e.status==='参加済み'?'badge-joined':e.status==='参加予定'?'badge-planned':'badge-none';
    const rc=e.status==='参加済み'?' joined':e.status==='参加予定'?' planned':'';
    return`<div class="event-card${rc}" style="${isPast?'opacity:.45':''}">
      <div class="ev-date"><div class="ev-mo">${parseInt(p[1])}月</div><div class="ev-d">${parseInt(p[2])}</div><div class="ev-wd">${wday(e.date)}</div></div>
      <div class="ev-info"><div class="ev-name">${e.name}</div><div class="ev-meta">${e.memo?e.memo+'・':''}${e.units}コマ</div></div>
      <span class="ev-badge ${bc}">${e.status}</span>
    </div>`;
  };
  let html='<div class="sec">これからの行事</div>';
  if(!upcoming.length)html+=`<div style="font-size:13px;color:var(--text3);padding:1rem 0">今後の行事はありません</div>`;
  upcoming.forEach(e=>html+=mkCard(e,false));
  if(past.length){
    html+=`<div class="sec" style="margin-top:1.5rem">過去の行事</div>`;
    past.forEach(e=>html+=mkCard(e,true));
  }
  con.innerHTML=html;
}

/* ---- カレンダー ---- */
function calMove(d){calM+=d;if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;}renderCal();}
function renderCal(){
  const todayKey=dateKey(nowD());
  document.getElementById('cal-month').textContent=`${calY}年${calM+1}月`;
  const grid=document.getElementById('cal-grid');
  grid.querySelectorAll('.cal-cell').forEach(c=>c.remove());
  const first=new Date(calY,calM,1);
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  const prevDays=new Date(calY,calM,0).getDate();
  let cells=[];
  for(let i=first.getDay()-1;i>=0;i--)cells.push({d:prevDays-i,mo:calM-1,other:true});
  for(let d=1;d<=daysInMonth;d++)cells.push({d,mo:calM,other:false});
  const rem=(7-cells.length%7)%7;
  for(let d=1;d<=rem;d++)cells.push({d,mo:calM+1,other:true});
  cells.forEach(({d,mo,other})=>{
    const m=((mo%12)+12)%12;
    const y=calY+(mo<0?-1:mo>11?1:0);
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasL=!other&&state.data[key]&&HOURS.some(h=>state.data[key][h]&&state.data[key][h].subject!=='（なし）');
    const hasE=!other&&state.events.some(e=>e.date===key);
    const isT=key===todayKey&&!other;
    const cell=document.createElement('div');
    cell.className='cal-cell'+(other?' other':'')+(isT?' today':'')+((hasL||hasE)?' has-data':'');
    cell.innerHTML=`<div class="cal-num">${d}</div>${hasL?'<div class="cal-pip-l">授業</div>':''}${hasE?'<div class="cal-pip-e">行事</div>':''}`;
    if(hasL||hasE)cell.onclick=()=>openSheet(key);
    grid.appendChild(cell);
  });
}

function openSheet(key){
  const dayData=state.data[key];
  const classes=dayData?HOURS.filter(h=>dayData[h]&&dayData[h].subject!=='（なし）'):[];
  const evts=state.events.filter(e=>e.date===key);
  document.getElementById('bs-title').textContent=`${fmtMD(key)}（${wday(key)}）`;
  let html='';
  evts.forEach(e=>{html+=`<div class="bs-event"><i class="ti ti-star" style="font-size:15px;color:var(--warn);flex-shrink:0"></i><span style="flex:1;font-size:14px;font-weight:500">${e.name}</span>${e.memo?`<span style="font-size:12px;color:var(--text2)">${e.memo}</span>`:''}</div>`;});
  classes.forEach(h=>{const s=dayData[h];html+=`<div class="bs-lesson"><span class="bs-time">${h}:00</span><span class="bs-name">${s.subject}</span>${s.room!=='（なし）'?`<span class="bs-room">${s.room}</span>`:''}</div>`;});
  document.getElementById('bs-body').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(e){if(!e||e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');}

/* ---- 登録 ---- */
function addDate(){
  const inp=document.getElementById('new-date');const v=inp.value;if(!v)return;
  if(state.dates.includes(v)){activeDate=v;renderTabs();renderSlots();renderProg();return;}
  state.dates.push(v);state.dates.sort();
  if(!state.data[v]){state.data[v]={};HOURS.forEach(h=>{state.data[v][h]={subject:'（なし）',room:'（なし）',attended:false};});}
  save();activeDate=v;renderTabs();renderSlots();renderProg();inp.value='';
  if(curPage==='cal')renderCal();
}
function renderTabs(){
  const row=document.getElementById('date-tabs');row.innerHTML='';
  state.dates.forEach(d=>{
    const btn=document.createElement('button');btn.className='date-tab'+(d===activeDate?' active':'');
    btn.textContent=`${fmtSlash(d)}（${wday(d)}）`;
    btn.onclick=()=>{activeDate=d;renderTabs();renderSlots();renderProg();};
    row.appendChild(btn);
  });
}
function renderSlots(){
  const con=document.getElementById('slots-con');
  if(!activeDate){con.innerHTML='<p style="font-size:13px;color:var(--text3)">上で日付を追加してください。</p>';return;}
  const dayData=state.data[activeDate];con.innerHTML='';
  HOURS.forEach(h=>{
    const slot=dayData[h];const hasClass=slot.subject!=='（なし）';
    const wrap=document.createElement('div');wrap.className='slot-row';
    const tl=document.createElement('div');tl.className='slot-time';tl.textContent=h+':00';
    const card=document.createElement('div');card.className='slot-card'+(hasClass?' active-slot':'');
    const ss=document.createElement('select');ss.setAttribute('aria-label',h+':00の科目');
    state.subjects.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;if(s===slot.subject)o.selected=true;ss.appendChild(o);});
    ss.onchange=e=>{state.data[activeDate][h].subject=e.target.value;if(e.target.value==='（なし）')state.data[activeDate][h].attended=false;save();renderSlots();renderProg();if(curPage==='cal')renderCal();};
    card.appendChild(ss);
    if(hasClass){
      const rs=document.createElement('select');rs.className='room-sel';rs.setAttribute('aria-label','教室');
      ROOMS.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;if(r===slot.room)o.selected=true;rs.appendChild(o);});
      rs.onchange=e=>{state.data[activeDate][h].room=e.target.value;save();};
      card.appendChild(rs);
    }
    wrap.appendChild(tl);wrap.appendChild(card);con.appendChild(wrap);
  });
}
function renderProg(){
  if(!activeDate)return;
  const dd=state.data[activeDate];
  const cl=HOURS.filter(h=>dd[h].subject!=='（なし）');
  const at=cl.filter(h=>dd[h].attended);
  const pct=cl.length?Math.round(at.length/cl.length*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=cl.length?`${fmtSlash(activeDate)}　${at.length}/${cl.length} コマ出席済み`:'授業を登録してください';
}
function renderLastSync(){
  const el=document.getElementById('last-sync');
  if(state.lastUpdated){
    const d=new Date(state.lastUpdated);
    el.textContent=`最終更新: ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  }else{
    el.textContent='まだ更新していません（初期データ表示中）';
  }
}

/* ---- スプシ同期 ---- */
async function syncFromSheet(){
  const btn=document.getElementById('update-btn');
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-refresh spinning" style="font-size:16px"></i> 読み込み中…';
  try{
    const res=await fetch(PROXY+encodeURIComponent(EXPORT_URL));
    if(!res.ok)throw new Error('fetch failed');
    const csv=await res.text();
    const rows=parseCSV(csv);
    const newSubjects=extractSubjects(rows);
    const newEvents=extractEvents(rows);
    if(newSubjects.length>0)state.subjects=['（なし）',...newSubjects];
    if(newEvents.length>0)state.events=newEvents;
    state.lastUpdated=new Date().toISOString();
    save();
    renderLastSync();
    btn.innerHTML='<i class="ti ti-check" style="font-size:16px"></i> 更新しました！';
    if(curPage==='events')renderEvents();
    if(curPage==='cal')renderCal();
  }catch(err){
    btn.innerHTML='<i class="ti ti-alert-circle" style="font-size:16px"></i> 読み込み失敗。もう一度お試しください';
  }
  setTimeout(()=>{
    btn.disabled=false;
    btn.innerHTML='<i class="ti ti-refresh" style="font-size:16px"></i> 科目リスト・行事を更新する';
  },3000);
}
function parseCSV(text){
  return text.split('\n').map(line=>{
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"')inQ=!inQ;
      else if(line[i]===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    cells.push(cur.trim());return cells;
  });
}
function extractSubjects(rows){
  const subjects=[];let in_=false;
  for(const row of rows){
    const c=row[0]||'';
    if(c==='履修科目'){in_=true;continue;}
    if(in_){if(!c||c==='履修教科'||/\d{4}年/.test(c)||/\d+[\/:]/.test(c))break;if(c&&!subjects.includes(c))subjects.push(c);}
  }
  return subjects;
}
function extractEvents(rows){
  const events=[];let in_=false;
  for(const row of rows){
    const c0=row[0]||'';
    if(c0==='実施月日'){in_=true;continue;}
    if(c0==='履修科目'||c0==='履修教科')break;
    if(in_&&c0&&row[2]){
      const date=parseJpDate(c0);if(!date)continue;
      events.push({date,name:row[2]||'',memo:row[3]||'',units:parseInt(row[4])||0,status:row[5]||'ー'});
    }
  }
  return events;
}
function parseJpDate(s){
  const m=s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  const m2=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m2)return`${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
  return null;
}

/* ---- 初期化 ---- */
const t=nowD();
calY=t.getFullYear();calM=t.getMonth();
document.getElementById('new-date').value=dateKey(t);
if(state.dates.length)activeDate=state.dates[state.dates.length-1];
renderDay('today');
</script>
