<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5f3ee">
<title>授業スケジュール</title>
<link rel="icon" href="00291.jpg">
<link rel="apple-touch-icon" href="00291.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="授業">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;--border:#e2ddd5;--border2:#ccc8bf;
  --text:#1a1814;--text2:#6b6760;--text3:#a09d97;
  --accent:#2d6a4f;--accent-bg:#eaf4ef;--accent-border:#a8d5bc;--accent-text:#1a4731;
  --yellow-bg:#fefce8;--yellow-border:#fde047;--yellow-text:#854d0e;
  --warn-bg:#fef3c7;--warn-border:#fcd34d;--warn:#b45309;
  --info:#1d4ed8;--info-bg:#eff6ff;--info-border:#93c5fd;
  --danger:#dc2626;--danger-bg:#fef2f2;--danger-border:#fca5a5;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1814;--surface:#25231f;--surface2:#2e2b26;--border:#3a3731;--border2:#4a4741;
  --text:#f0ede6;--text2:#a09d97;--text3:#6b6760;
  --accent:#4ade80;--accent-bg:#14381f;--accent-border:#166534;--accent-text:#86efac;
  --yellow-bg:#2a1f00;--yellow-border:#854d0e;--yellow-text:#fde047;
  --warn-bg:#2d1f02;--warn-border:#78350f;--warn:#fbbf24;
  --info:#60a5fa;--info-bg:#0f1e3d;--info-border:#1e3a8a;
  --danger:#f87171;--danger-bg:#2d0a0a;--danger-border:#991b1b;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100dvh}
.main{flex:1;padding:1.25rem 1rem calc(72px + env(safe-area-inset-bottom));overflow-y:auto}
.page{display:none}.page.active{display:block}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 8px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;font-size:10px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn i{font-size:22px}
.day-hero{margin-bottom:1.25rem}
.hero-label{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.1em;margin-bottom:3px}
.hero-date{font-size:24px;font-weight:700}
.sec{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin:1.25rem 0 8px}
.sec:first-child{margin-top:0}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.5}
.empty p{font-size:14px;line-height:1.9}
.lcard{display:flex;align-items:center;gap:12px;padding:14px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:background .12s,opacity .15s}
.lcard:active{background:var(--surface2)}
.lcard.attended{background:var(--yellow-bg);border-color:var(--yellow-border)}
.lcard.current{border-color:var(--info-border)}
.lcard.faded{opacity:.4}
.l-time{font-size:13px;font-weight:500;color:var(--text2);width:38px;flex-shrink:0}
.l-name{flex:1;font-size:15px;font-weight:500}
.l-room{font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;flex-shrink:0}
.now-chip{font-size:10px;font-weight:700;background:var(--info);color:#fff;border-radius:6px;padding:2px 7px;flex-shrink:0}
.att-mark{font-size:18px;color:var(--yellow-text);flex-shrink:0}
.evcard{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow)}
.evcard.joined{background:var(--accent-bg);border-color:var(--accent-border)}
.evcard.planned{background:var(--warn-bg);border-color:var(--warn-border)}
.ev-date{width:44px;flex-shrink:0;text-align:center}
.ev-mo{font-size:10px;color:var(--text3);font-weight:500}
.ev-d{font-size:20px;font-weight:700;line-height:1.2}
.ev-wd{font-size:10px;color:var(--text3)}
.ev-info{flex:1;min-width:0}
.ev-name{font-size:14px;font-weight:500;margin-bottom:2px}
.ev-meta{font-size:12px;color:var(--text2)}
.ev-badge{font-size:11px;font-weight:500;border-radius:6px;padding:3px 8px;flex-shrink:0;white-space:nowrap;border:1px solid}
.b-joined{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-border)}
.b-planned{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.b-none{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-mon{font-size:18px;font-weight:700}
.cal-arr{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);box-shadow:var(--shadow)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-wd{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:4px 0}
.cal-cell{min-height:54px;border-radius:var(--radius-sm);padding:5px 3px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:background .1s}
.cal-cell:active{background:var(--surface2)}
.cal-cell.other{background:transparent;border-color:transparent;opacity:.2;cursor:default;pointer-events:none}
.cal-cell.today-c{border-color:var(--info-border);background:var(--info-bg)}
.cal-num{font-size:12px;font-weight:500;text-align:center;margin-bottom:2px}
.cal-cell.today-c .cal-num{color:var(--info);font-weight:700}
.pip{font-size:9px;border-radius:3px;padding:1px 2px;text-align:center;line-height:1.5;margin-bottom:2px;border:1px solid}
.pip.lesson{background:var(--info-bg);color:var(--info);border-color:var(--info-border)}
.pip.event{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;padding:1.25rem 1rem calc(1.5rem + env(safe-area-inset-bottom));max-height:90dvh;overflow-y:auto}
.sh-handle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 1rem}
.sh-title{font-size:17px;font-weight:700;margin-bottom:1rem}
.sh-close{width:100%;padding:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;margin-top:12px;font-family:inherit;font-weight:500}
.sh-ev{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);margin-bottom:8px}
.reg-slot{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.reg-time{font-size:12px;color:var(--text3);width:36px;flex-shrink:0;font-weight:500}
.reg-card{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;display:flex;align-items:center;gap:8px}
.reg-card.has{background:var(--surface);border-color:var(--accent-border)}
.subj-sel{border:none;background:transparent;color:var(--text);cursor:pointer;padding:0;outline:none;font-family:inherit;font-size:14px;flex:1;min-width:0}
.room-sel{font-size:13px;color:var(--text2);background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:3px 6px;outline:none;font-family:inherit;cursor:pointer;flex-shrink:0;min-width:58px}
.clr-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0}
.clr-btn:active{background:var(--border)}
.set-group-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.06em;margin-bottom:8px}
.set-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.set-row{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;transition:background .1s}
.set-row:active{background:var(--surface2)}
.set-row+.set-row{border-top:1px solid var(--border)}
.set-row-icon{font-size:20px;color:var(--text2);flex-shrink:0}
.set-row-icon.danger{color:var(--danger)}
.set-row-body{flex:1}
.set-row-title{font-size:14px;font-weight:500;color:var(--text)}
.set-row-title.danger{color:var(--danger)}
.set-row-sub{font-size:12px;color:var(--text3);margin-top:1px}
.set-row-arrow{font-size:16px;color:var(--text3)}
.set-last-sync{font-size:11px;color:var(--text3);text-align:center;margin-top:.5rem}
.dialog-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:2rem}
.dialog-bg.open{display:flex}
.dialog{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:300px}
.dlg-title{font-size:16px;font-weight:700;margin-bottom:6px}
.dlg-sub{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.7}
.dlg-btns{display:flex;gap:8px}
.dlg-btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.dlg-yes{background:var(--yellow-bg);border-color:var(--yellow-border);color:var(--yellow-text)}
.dlg-yes:active{background:var(--yellow-border)}
.dlg-no{background:var(--surface2);color:var(--text2)}
.dlg-no:active{background:var(--border)}
.dlg-undo{width:100%;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px}
.dlg-danger{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)}
.dlg-danger:active{opacity:.8}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<main class="main">
  <div class="page active" id="page-today"></div>
  <div class="page" id="page-tmrw"></div>
  <div class="page" id="page-cal">
    <div class="cal-hdr">
      <button class="cal-arr" onclick="calMove(-1)" aria-label="前の月"><i class="ti ti-chevron-left" style="font-size:18px"></i></button>
      <div class="cal-mon" id="cal-mon"></div>
      <button class="cal-arr" onclick="calMove(1)" aria-label="次の月"><i class="ti ti-chevron-right" style="font-size:18px"></i></button>
    </div>
    <div style="text-align:center;margin-bottom:12px;">
      <button onclick="openAttendanceSheet()" style="padding:6px 16px;border:1px solid var(--border2);border-radius:20px;background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:4px;"><i class="ti ti-checkbox" style="font-size:15px;color:var(--accent)"></i>出席数を確認</button>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="cal-wd">日</div><div class="cal-wd">月</div><div class="cal-wd">火</div>
      <div class="cal-wd">水</div><div class="cal-wd">木</div><div class="cal-wd">金</div><div class="cal-wd">土</div>
    </div>
  </div>
  <div class="page" id="page-events"></div>
  <div class="page" id="page-settings"></div>
</main>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('today')" id="nav-today"><i class="ti ti-sun"></i>今日</button>
  <button class="nav-btn" onclick="showPage('tmrw')" id="nav-tmrw"><i class="ti ti-moon"></i>明日</button>
  <button class="nav-btn" onclick="showPage('cal')" id="nav-cal"><i class="ti ti-calendar"></i>カレンダー</button>
  <button class="nav-btn" onclick="showPage('events')" id="nav-events"><i class="ti ti-star"></i>行事</button>
  <button class="nav-btn" onclick="showPage('settings')" id="nav-settings"><i class="ti ti-settings"></i>設定</button>
</nav>

<div class="overlay" id="cal-overlay" onclick="closeCalSheet(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title" id="cal-sheet-title"></div>
    <div id="cal-sheet-body"></div>
    <button class="sh-close" onclick="closeCalSheet()">閉じる</button>
  </div>
</div>

<div class="overlay" id="att-overlay" onclick="closeAttSheet(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title">科目別 出席数</div>
    <div id="att-sheet-body"></div>
    <button class="sh-close" onclick="closeAttSheet()">閉じる</button>
  </div>
</div>

<div class="dialog-bg" id="dlg-bg">
  <div class="dialog">
    <div class="dlg-title" id="dlg-title"></div>
    <div class="dlg-sub" id="dlg-sub"></div>
    <div class="dlg-btns" id="dlg-btns">
      <button class="dlg-btn dlg-no" onclick="closeDlg(false)">いいえ</button>
      <button class="dlg-btn dlg-yes" onclick="closeDlg(true)">はい ✓</button>
    </div>
    <button class="dlg-undo" id="dlg-undo" style="display:none" onclick="closeDlg('undo')">出席を取り消す</button>
  </div>
</div>

<div class="dialog-bg" id="reset-dlg-bg">
  <div class="dialog">
    <div class="dlg-title">データをリセット</div>
    <div class="dlg-sub">登録した授業・出席記録が全て削除されます。この操作は取り消せません。</div>
    <div class="dlg-btns">
      <button class="dlg-btn dlg-no" onclick="closeResetDlg(false)">キャンセル</button>
      <button class="dlg-btn dlg-danger" onclick="closeResetDlg(true)">リセットする</button>
    </div>
  </div>
</div>

<script>
// 🟩 GAS WebアプリURLを設定
var API_URL = 'https://script.google.com/macros/s/AKfycbxXGY5THWVWd3ymWLmiILYH28CiUW4wQiDF6h5B_kfVATRyff-Os-C8uW5mONmf3CvgQA/exec';
var SHEET_URL = 'https://docs.google.com/spreadsheets/d/1FEAlmLlGvrKvwpAPJZB2pB0Z1RhVvnGqrrEjrNRUi2A/edit?gid=1793831840#gid=1793831840';

var ROOMS = ['301','302','401','501','601','701','801'];
var HOURS = [9,10,11,12,13,14,15,16];
var WDAYS = ['日','月','火','水','木','金','土'];
var DEF_SUBJECTS = ['現代の国語','言語文化','地理総合','歴史総合','数学Ⅰ','科学と人間生活','体育①','保険①','英語コミュⅠ','情報Ⅰ','総合探求①','キャリ教基'];
var DEF_EVENTS = [
  {date:'2026-04-01',name:'スタートアップセミナー',memo:'',units:2,status:'参加済み'},
  {date:'2026-04-01',name:'進路ガイダンス',memo:'',units:2,status:'参加済み'},
  {date:'2026-04-06',name:'入学式',memo:'',units:1,status:'参加済み'},
  {date:'2026-04-24',name:'BBQ',memo:'',units:2,status:'参加済み'},
  {date:'2026-05-22',name:'動物園遠足',memo:'',units:2,status:'ー'},
  {date:'2026-05-30',name:'野球観戦',memo:'',units:3,status:'ー'},
  {date:'2026-06-29',name:'ASU★FES',memo:'',units:3,status:'参加予定'},
  {date:'2026-07-17',name:'ビューティーショー',memo:'',units:2,status:'ー'},
  {date:'2026-07-28',name:'陶芸教室',memo:'',units:2,status:'ー'},
  {date:'2026-08-07',name:'きずなオリンピック',memo:'',units:3,status:'ー'},
  {date:'2026-09-14',name:'前期終業式',memo:'',units:2,status:'参加予定'},
  {date:'2026-09-15',name:'三幸フェスティバル見学',memo:'',units:2,status:'ー'},
  {date:'2026-10-01',name:'後期始業式',memo:'',units:2,status:'参加予定'},
  {date:'2026-10-19',name:'救急蘇生員講習会',memo:'',units:2,status:'ー'},
  {date:'2026-10-30',name:'ハロウィン清掃',memo:'',units:2,status:'ー'},
  {date:'2026-11-09',name:'文化祭準備日',memo:'',units:2,status:'参加予定'},
  {date:'2026-11-10',name:'文化祭1日目',memo:'',units:3,status:'参加予定'},
  {date:'2026-11-11',name:'文化祭2日目',memo:',units:3,status:'参加予定'},
  {date:'2026-12-11',name:'ボウリング大会',memo:'2000円',units:2,status:'参加予定'},
  {date:'2026-12-25',name:'大掃除',memo:'',units:3,status:'参加予定'},
  {date:'2027-01-08',name:'太宰府天満宮参拝',memo:'',units:2,status:'ー'},
  {date:'2027-01-22',name:'DVD鑑賞会',memo:'',units:3,status:'参加予定'},
  {date:'2027-02-12',name:'いちご狩り',memo:'3500円',units:2,status:'ー'},
  {date:'2027-02-22',name:'後期終業式',memo:'福岡市民ホール',units:2,status:'参加予定'},
  {date:'2027-03-02',name:'在校生HR',memo:'どちらか1日',units:2,status:'参加予定'},
  {date:'2027-03-03',name:'在校生HR',memo:'どちらか1日',units:2,status:'参加予定'},
  {date:'2027-03-08',name:'後期卒業式',memo:'福岡市民ホール',units:2,status:'参加予定'}
];

var state = JSON.parse(localStorage.getItem('school_v11') || 'null') || {dates:[],data:{},subjects:[],events:[],lastUpdated:null};
if (!state.subjects || !state.subjects.length) state.subjects = DEF_SUBJECTS;
if (!state.events || !state.events.length) state.events = DEF_EVENTS;

var curPage = 'today', calY = 0, calM = 0, dlgKey = null, dlgH = null, calSheetKey = null;

function save() { try { localStorage.setItem('school_v11', JSON.stringify(state)); } catch(e) {} }
function dateKey(d) { return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-'); }
function fmtMD(s) { var p = s.split('-'); return parseInt(p[1]) + '月' + parseInt(p[2]) + '日'; }
function wday(s) { return WDAYS[new Date(s + 'T00:00:00').getDay()]; }
function nowD() { return new Date(); }

function showPage(p) {
  curPage = p;
  ['today','tmrw','cal','events','settings'].forEach(function(id) {
    document.getElementById('page-' + id).classList.toggle('active', id === p);
    document.getElementById('nav-' + id).classList.toggle('active', id === p);
  });
  if (p === 'today') renderDay('today');
  else if (p === 'tmrw') renderDay('tmrw');
  else if (p === 'cal') renderCal();
  else if (p === 'events') renderEvents();
  else renderSettings();
}

function renderDay(which) {
  var today = nowD();
  var target = new Date(today);
  if (which === 'tmrw') target.setDate(target.getDate() + 1);
  var key = dateKey(target);
  var con = document.getElementById('page-' + which);
  var nowH = today.getHours();
  var html = '<div class="day-hero"><div class="hero-label">' + (which === 'today' ? 'TODAY · 今日' : 'TOMORROW · 明日') + '</div><div class="hero-date">' + fmtMD(key) + '（' + wday(key) + '）</div></div>';

  var dayEvts = state.events.filter(function(e) { return e.date === key; });
  if (dayEvts.length) {
    html += '<div class="sec">行事</div>';
    dayEvts.forEach(function(e) {
      var bc = e.status === '参加済み' ? 'b-joined' : e.status === '参加予定' ? 'b-planned' : 'b-none';
      var rc = e.status === '参加済み' ? ' joined' : e.status === '参加予定' ? ' planned' : '';
      html += '<div class="evcard' + rc + '"><i class="ti ti-star" style="font-size:16px;color:var(--warn);flex-shrink:0;margin-top:3px"></i><div class="ev-info"><div class="ev-name">' + e.name + '</div><div class="ev-meta">' + (e.memo ? e.memo + '・' : '') + e.units + 'コマ</div></div><span class="ev-badge ' + bc + '">' + e.status + '</span></div>';
    });
  }

  var dayData = state.data[key];
  var classes = dayData ? HOURS.filter(function(h) { return dayData[h] && dayData[h].subject; }) : [];
  if (!classes.length) {
    if (!dayEvts.length) html += '<div class="empty"><i class="ti ti-calendar-off"></i><p>授業が登録されていません<br><span style="font-size:12px">カレンダーの日付をタップして登録できます</span></p></div>';
    con.innerHTML = html; return;
  }

  var past = which === 'today' ? classes.filter(function(h) { return h < nowH; }) : [];
  var upcoming = which === 'today' ? classes.filter(function(h) { return h >= nowH; }) : classes;

  if (upcoming.length) {
    html += '<div class="sec">' + (which === 'today' && past.length ? 'これから' : '授業') + '</div>';
    upcoming.forEach(function(h) {
      var s = dayData[h]; var isCur = which === 'today' && h === nowH; var att = s.attended;
      var tap = which === 'today' ? 'onclick="openDlg(\'' + key + '\',' + h + ')"' : 'style="cursor:default"';
      html += '<div class="lcard' + (isCur ? ' current' : '') + (att ? ' attended' : '') + '" ' + tap + '><span class="l-time">' + h + ':00</span><span class="l-name">' + s.subject + '</span>' + (s.room ? '<span class="l-room">' + s.room + '</span>' : '') + (isCur ? '<span class="now-chip">NOW</span>' : '') + (att ? '<i class="ti ti-check att-mark"></i>' : '') + '</div>';
    });
  }
  if (past.length) {
    html += '<div class="sec" style="margin-top:1.25rem">終わった授業</div>';
    past.forEach(function(h) {
      var s = dayData[h]; var att = s.attended;
      html += '<div class="lcard faded" onclick="openDlg(\'' + key + '\',' + h + ')"><span class="l-time">' + h + ':00</span><span class="l-name">' + s.subject + '</span>' + (s.room ? '<span class="l-room">' + s.room + '</span>' : '') + (att ? '<i class="ti ti-check att-mark"></i>' : '') + '</div>';
    });
  }
  con.innerHTML = html;
}

function openDlg(key, h) {
  dlgKey = key; dlgH = h;
  var s = state.data[key][h]; var att = s.attended;
  document.getElementById('dlg-title').textContent = h + ':00　' + s.subject;
  document.getElementById('dlg-sub').textContent = att ? '出席済みとして記録されています。' : 'この授業に出席しましたか？';
  document.getElementById('dlg-btns').style.display = att ? 'none' : 'flex';
  document.getElementById('dlg-undo').style.display = att ? 'block' : 'none';
  document.getElementById('dlg-bg').classList.add('open');
}

function closeDlg(result) {
  document.getElementById('dlg-bg').classList.remove('open');
  if (result === true || result === 'undo') {
    state.data[dlgKey][dlgH].attended = (result === true);
    save(); renderDay('today'); renderCal();
    // 🟩 出席チェックの変更をGASにリアルタイム保存
    postRecordToGAS('save', dlgKey, dlgH);
  }
  dlgKey = null; dlgH = null;
}

function renderEvents() {
  var con = document.getElementById('page-events');
  var today = dateKey(nowD());
  var upcoming = state.events.filter(function(e) { return e.date >= today; }).sort(function(a,b) { return a.date.localeCompare(b.date); });
  var past = state.events.filter(function(e) { return e.date < today; }).sort(function(a,b) { return b.date.localeCompare(a.date); });
  function mkEv(e, dim) {
    var p = e.date.split('-');
    var bc = e.status === '参加済み' ? 'b-joined' : e.status === '参加予定' ? 'b-planned' : 'b-none';
    var rc = e.status === '参加済み' ? ' joined' : e.status === '参加予定' ? ' planned' : '';
    return '<div class="evcard' + rc + '"' + (dim ? ' style="opacity:.45"' : '') + '><div class="ev-date"><div class="ev-mo">' + parseInt(p[1]) + '月</div><div class="ev-d">' + parseInt(p[2]) + '</div><div class="ev-wd">' + wday(e.date) + '</div></div><div class="ev-info"><div class="ev-name">' + e.name + '</div><div class="ev-meta">' + (e.memo ? e.memo + '・' : '') + e.units + 'コマ</div></div><span class="ev-badge ' + bc + '">' + e.status + '</span></div>';
  }
  var html = '<div class="sec">これからの行事</div>';
  if (!upcoming.length) html += '<div style="font-size:13px;color:var(--text3);padding:1rem 0">今後の行事はありません</div>';
  upcoming.forEach(function(e) { html += mkEv(e, false); });
  if (past.length) { html += '<div class="sec" style="margin-top:1.5rem">過去の行事</div>'; past.forEach(function(e) { html += mkEv(e, true); }); }
  con.innerHTML = html;
}

function calMove(d) { calM += d; if (calM > 11) { calM = 0; calY++; } else if (calM < 0) { calM = 11; calY--; } renderCal(); }
function renderCal() {
  var todayKey = dateKey(nowD());
  document.getElementById('cal-mon').textContent = calY + '年' + (calM + 1) + '月';
  var grid = document.getElementById('cal-grid');
  grid.querySelectorAll('.cal-cell').forEach(function(c) { c.remove(); });
  var first = new Date(calY, calM, 1);
  var dim = new Date(calY, calM + 1, 0).getDate();
  var prev = new Date(calY, calM, 0).getDate();
  var cells = [];
  for (var i = first.getDay() - 1; i >= 0; i--) cells.push({d: prev - i, mo: calM - 1, other: true});
  for (var d = 1; d <= dim; d++) cells.push({d: d, mo: calM, other: false});
  var rem = (7 - cells.length % 7) % 7;
  for (var d2 = 1; d2 <= rem; d2++) cells.push({d: d2, mo: calM + 1, other: true});
  cells.forEach(function(item) {
    var m = ((item.mo % 12) + 12) % 12;
    var y = calY + (item.mo < 0 ? -1 : item.mo > 11 ? 1 : 0);
    var key = y + '-' + String(m + 1).padStart(2,'0') + '-' + String(item.d).padStart(2,'0');
    var hasL = !item.other && state.data[key] && HOURS.some(function(h) { return state.data[key][h] && state.data[key][h].subject; });
    var hasE = !item.other && state.events.some(function(e) { return e.date === key; });
    var isT = !item.other && key === todayKey;
    var cell = document.createElement('div');
    cell.className = 'cal-cell' + (item.other ? ' other' : '') + (isT ? ' today-c' : '');
    cell.innerHTML = '<div class="cal-num">' + item.d + '</div>' + (hasL ? '<div class="pip lesson">授業</div>' : '') + (hasE ? '<div class="pip event">行事</div>' : '');
    if (!item.other) cell.onclick = (function(k) { return function() { openCalSheet(k); }; })(key);
    grid.appendChild(cell);
  });
}

function openCalSheet(key) {
  calSheetKey = key;
  if (!state.data[key]) {
    state.data[key] = {};
    HOURS.forEach(function(h) { state.data[key][h] = {subject:'', room:'', attended:false}; });
    if (!state.dates.includes(key)) { state.dates.push(key); state.dates.sort(); }
    save();
  }
  document.getElementById('cal-sheet-title').textContent = fmtMD(key) + '（' + wday(key) + '）';
  renderCalSheetBody(key);
  document.getElementById('cal-overlay').classList.add('open');
}

function renderCalSheetBody(key) {
  var dayData = state.data[key];
  var evts = state.events.filter(function(e) { return e.date === key; });
  var html = '';
  if (evts.length) {
    html += '<div class="sec" style="margin-top:0">行事</div>';
    evts.forEach(function(e) {
      html += '<div class="sh-ev"><i class="ti ti-star" style="font-size:14px;color:var(--warn);flex-shrink:0"></i><span style="flex:1;font-size:14px;font-weight:500">' + e.name + '</span>' + (e.memo ? '<span style="font-size:12px;color:var(--text2)">' + e.memo + '</span>' : '') + '</div>';
    });
  }
  html += '<div class="sec" style="' + (evts.length ? '' : 'margin-top:0') + '">授業を登録</div>';
  HOURS.forEach(function(h) {
    var slot = dayData[h] || {subject:'', room:'', attended:false};
    var has = !!slot.subject;
    var subjOpts = '<option value="">（なし）</option>' + state.subjects.map(function(s) { return '<option value="' + s + '"' + (slot.subject === s ? ' selected' : '') + '>' + s + '</option>'; }).join('');
    var roomOpts = '<option value="">　</option>' + ROOMS.map(function(r) { return '<option value="' + r + '"' + (slot.room === r ? ' selected' : '') + '>' + r + '</option>'; }).join('');
    html += '<div class="reg-slot"><span class="reg-time">' + h + ':00</span><div class="reg-card' + (has ? ' has' : '') + '" id="rc-' + h + '"><select class="subj-sel" id="ss-' + h + '" onchange="onSubjChange(' + h + ')" aria-label="' + h + '時の科目">' + subjOpts + '</select>' + (has ? '<select class="room-sel" id="rs-' + h + '" onchange="onRoomChange(' + h + ')" aria-label="教室">' + roomOpts + '</select><button class="clr-btn" onclick="clearSlot(' + h + ')" aria-label="クリア"><i class="ti ti-x" style="font-size:12px"></i></button>' : '') + '</div></div>';
  });
  document.getElementById('cal-sheet-body').innerHTML = html;
}

function onSubjChange(h) {
  var val = document.getElementById('ss-' + h).value;
  if (!state.data[calSheetKey][h]) state.data[calSheetKey][h] = {subject:'', room:'', attended:false};
  state.data[calSheetKey][h].subject = val;
  if (!val) { 
    state.data[calSheetKey][h].room = ''; 
    state.data[calSheetKey][h].attended = false; 
    save(); renderCalSheetBody(calSheetKey);
    // 🟩 科目を空にした場合はGASから行を削除
    postRecordToGAS('delete', calSheetKey, h);
  } else {
    save(); renderCalSheetBody(calSheetKey);
    // 🟩 科目を登録した場合はGASへ即時保存
    postRecordToGAS('save', calSheetKey, h);
  }
}

function onRoomChange(h) {
  state.data[calSheetKey][h].room = document.getElementById('rs-' + h).value;
  save();
  // 🟩 教室変更もGASに即時保存
  postRecordToGAS('save', calSheetKey, h);
}

function clearSlot(h) {
  state.data[calSheetKey][h] = {subject:'', room:'', attended:false};
  save(); renderCalSheetBody(calSheetKey);
  // 🟩 クリアボタンを押した場合はGASから行を削除
  postRecordToGAS('delete', calSheetKey, h);
}

function closeCalSheet(e) {
  if (!e || e.target === document.getElementById('cal-overlay')) {
    document.getElementById('cal-overlay').classList.remove('open');
    renderCal();
    if (curPage === 'today') renderDay('today');
    if (curPage === 'tmrw') renderDay('tmrw');
    calSheetKey = null;
  }
}

// 📊 科目別出席数シートを開く関数を追加
function openAttendanceSheet() {
  var counts = {};
  state.subjects.forEach(function(s) { counts[s] = 0; });
  
  Object.keys(state.data).forEach(function(date) {
    var dayData = state.data[date];
    if (dayData) {
      Object.keys(dayData).forEach(function(h) {
        var slot = dayData[h];
        if (slot && slot.subject && slot.attended) {
          if (!counts[slot.subject]) counts[slot.subject] = 0;
          counts[slot.subject]++;
        }
      });
    }
  });
  
  var html = '<div class="set-group" style="margin-top:0; max-height: 50dvh; overflow-y: auto;">';
  state.subjects.forEach(function(s) {
    var c = counts[s] || 0;
    html += '<div class="set-row" style="cursor:default;pointer-events:none;"><div class="set-row-body"><div class="set-row-title">' + s + '</div></div><span style="font-size:15px;font-weight:700;color:var(--accent);">' + c + ' コマ</span></div>';
  });
  html += '</div>';
  
  document.getElementById('att-sheet-body').innerHTML = html;
  document.getElementById('att-overlay').classList.add('open');
}

function closeAttSheet(e) {
  if (!e || e.target === document.getElementById('att-overlay')) {
    document.getElementById('att-overlay').classList.remove('remove');
    document.getElementById('att-overlay').classList.remove('open');
  }
}

function renderSettings() {
  var lastSync = '';
  if (state.lastUpdated) {
    var d = new Date(state.lastUpdated);
    lastSync = '最終更新: ' + d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
  } else {
    lastSync = 'まだ更新していません（初期データ表示中）';
  }
  var html = '<div class="sec">スプレッドシート連携</div><div class="set-group"><div class="set-row" onclick="syncFromSheet()"><i class="ti ti-refresh set-row-icon" id="sync-icon"></i><div class="set-row-body"><div class="set-row-title">スプシからデータを読込</div><div class="set-row-sub">科目・行事・登録済み授業を同期</div></div><i class="ti ti-chevron-right set-row-arrow"></i></div><a class="set-row" href="' + SHEET_URL + '" target="_blank" rel="noopener" style="text-decoration:none"><i class="ti ti-table set-row-icon"></i><div class="set-row-body"><div class="set-row-title">スプレッドシートを開く</div><div class="set-row-sub">Googleスプレッドシートへ</div></div><i class="ti ti-external-link set-row-arrow"></i></a></div><div class="set-last-sync" id="set-last-sync">' + lastSync + '</div><div class="sec" style="margin-top:1.5rem">データ管理</div><div class="set-group"><div class="set-row" onclick="openResetDlg()"><i class="ti ti-trash set-row-icon danger"></i><div class="set-row-body"><div class="set-row-title danger">データをリセット</div><div class="set-row-sub">登録した授業・出席記録を全て削除</div></div><i class="ti ti-chevron-right set-row-arrow"></i></div></div>';
  document.getElementById('page-settings').innerHTML = html;
}

function openResetDlg() {
  document.getElementById('reset-dlg-bg').classList.add('open');
}
function closeResetDlg(doReset) {
  document.getElementById('reset-dlg-bg').classList.remove('open');
  if (doReset) {
    state.dates = [];
    state.data = {};
    save();
    renderCal();
    if (curPage === 'today') renderDay('today');
    if (curPage === 'tmrw') renderDay('tmrw');
    renderSettings();
  }
}

// 🟩 GASからデータを読み込む関数 (GET)
async function syncFromSheet() {
  var icon = document.getElementById('sync-icon');
  if (icon) { icon.className = 'ti ti-refresh set-row-icon spinning'; }
  try {
    var res = await fetch(API_URL + '?mode=all');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    
    // 1. 科目リストの同期
    if (data.subjects && data.subjects.length) state.subjects = data.subjects;
    // 2. 行事リストの同期
    if (data.events && data.events.length) state.events = data.events;
    
    // 3. 授業記録の同期 (アプリ内のデータ構造へ展開)
    state.data = {};
    state.dates = [];
    if (data.records && data.records.length) {
      data.records.forEach(function(r) {
        if (!state.data[r.date]) {
          state.data[r.date] = {};
          HOURS.forEach(function(h) {
            state.data[r.date][h] = {subject:'', room:'', attended:false};
          });
        }
        state.data[r.date][r.hour] = {
          subject: r.subject,
          room: r.room,
          attended: r.attended
        };
        if (!state.dates.includes(r.date)) {
          state.dates.push(r.date);
        }
      });
      state.dates.sort();
    }
    
    state.lastUpdated = new Date().toISOString();
    save();
    if (curPage === 'events') renderEvents();
    renderCal();
    if (curPage === 'today') renderDay('today');
    if (curPage === 'tmrw') renderDay('tmrw');
    renderSettings();
  } catch(err) {
    if (icon) { icon.className = 'ti ti-alert-circle set-row-icon'; }
    alert('更新失敗: ' + err.message);
    setTimeout(function() { renderSettings(); }, 2000);
  }
}

// 🟩 GASへデータを送信する共通関数 (POST)
async function postRecordToGAS(action, key, h) {
  var slot = state.data[key][h];
  var payload = {
    action: action,
    data: {
      date: key,
      hour: Number(h),
      subject: slot.subject || '',
      room: slot.room || '',
      attended: !!slot.attended
    }
  };
  
  try {
    // プレフライト(OPTIONS)制限を回避するため敢えてヘッダーは未設定で送信
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
  } catch(e) {
    console.error('GAS同期エラー:', e);
  }
}

var t = nowD(); calY = t.getFullYear(); calM = t.getMonth();
renderDay('today');
</script>
